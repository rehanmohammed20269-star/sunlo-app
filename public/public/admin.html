<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel 💙</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      display: flex;
      height: 100vh;
      background: #f1f5f9;
    }

    /* Sidebar */
    #users {
      width: 30%;
      background: #1e293b;
      color: white;
      overflow-y: auto;
      padding: 10px;
    }

    #users h3 {
      text-align: center;
    }

    .user {
      padding: 10px;
      margin: 5px 0;
      background: #334155;
      border-radius: 8px;
      cursor: pointer;
    }

    .user:hover {
      background: #475569;
    }

    /* Chat Area */
    #chatArea {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #4a6cf7;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: #ddd;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #4a6cf7;
      color: white;
    }
  </style>
</head>

<body>

<!-- USERS -->
<div id="users">
  <h3>👥 Users</h3>
  <div id="userList"></div>
</div>

<!-- CHAT -->
<div id="chatArea">
  <div id="chatBox"></div>

  <div id="inputArea">
    <input id="input" placeholder="Reply karo...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
  var socket = io();
  var adminId = "admin123";
  var selectedUser = null;

  socket.emit("join", adminId);

  let users = {};

  function addUser(id){
    if(users[id]) return;

    users[id] = true;

    let div = document.createElement("div");
    div.classList.add("user");
    div.innerText = "User: " + id;

    div.onclick = function(){
      selectedUser = id;
      document.getElementById("chatBox").innerHTML = "";
    };

    document.getElementById("userList").appendChild(div);
  }

  function addMsg(text, type){
    let div = document.createElement("div");
    div.classList.add("msg", type);
    div.innerText = text;
    document.getElementById("chatBox").appendChild(div);
  }

  function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(text === "" || !selectedUser) return;

    addMsg(text, "me");

    socket.emit("private message", {
      from: adminId,
      to: selectedUser,
      msg: text
    });

    input.value = "";
  }

  socket.on("private message", function(data){
    if(data.to === adminId){
      addUser(data.from);

      if(data.from === selectedUser){
        addMsg(data.msg, "other");
      }
    }
  });
</script>

</body>
</html>
