<!DOCTYPE html>
<html>
<head>
  <title>💙 SunLo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #eef2ff;
    }

    header {
      background: #4a6cf7;
      color: white;
      padding: 15px;
      text-align: center;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #4a6cf7;
      color: white;
      margin-left: auto;
    }

    .other {
      background: #ddd;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: white;
    }
  </style>
</head>

<body>

<header>💙 SunLo - Tum akela nahi ho</header>

<div id="chatBox"></div>

<div id="inputArea">
  <input id="input" placeholder="Apni baat likho...">
  <button onclick="send()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
  var socket = io();
  var myId = Math.random().toString(36).substr(2,5);
  var adminId = "admin123";

  socket.emit("join", myId);

  function addMsg(text, type){
    let div = document.createElement("div");
    div.classList.add("msg", type);
    div.innerText = text;
    document.getElementById("chatBox").appendChild(div);
  }

  function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();

    if(text === "") return;

    addMsg(text, "me");

    socket.emit("private message", {
      from: myId,
      to: adminId,
      msg: text
    });

    input.value = "";
  }

  socket.on("private message", function(data){
    if(data.from !== myId){
      addMsg(data.msg, "other");
    }
  });
</script>

</body>
</html>
