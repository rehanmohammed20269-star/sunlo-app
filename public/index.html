<!DOCTYPE html>
<html>
<head>
<title>SunLo 💙</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

#status {
  font-size:12px;
  color:lightgray;
}

/* CHAT */
#chat {
  height:65vh;
  overflow-y:auto;
  padding:10px;
}

/* MSG */
.msg {
  padding:10px;
  margin:8px;
  border-radius:15px;
  max-width:70%;
}

.me {
  background:#4a6cf7;
  margin-left:auto;
}

.other {
  background:#1e293b;
}

/* INPUT */
.inputBox {
  display:flex;
  padding:10px;
  gap:5px;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

button {
  padding:10px;
  border:none;
  border-radius:50%;
  background:#4a6cf7;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <b>SunLo 💙</b><br>
    <span id="status">online</span>
  </div>
  <div>
    📞
  </div>
</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="Message..." />

  <input type="file" id="imgInput" hidden>
  <button onclick="imgInput.click()">📎</button>

  <button onclick="startRec()">🎤</button>

  <button onclick="sendMsg()">➤</button>
</div>

<audio id="sound" src="/notification.mp3"></audio>

<script>
const socket = io();
let username = prompt("Enter name");
socket.emit("join",{name:username});

// 🔔 sound
function playSound(){
  let s=document.getElementById("sound");
  s.currentTime=0;
  s.play().catch(()=>{});
}
document.body.addEventListener("click",()=>playSound(),{once:true});

// 💬 send msg
function sendMsg(){
  let msg=document.getElementById("msg").value;

  socket.emit("userMessage",msg);

  document.getElementById("chat").innerHTML+=
    `<div class="msg me">${msg} ✔</div>`;

  document.getElementById("msg").value="";
}

// 📩 receive
socket.on("adminReply",(msg)=>{
  document.getElementById("chat").innerHTML+=
    `<div class="msg other">${msg} ✔✔</div>`;

  playSound();
});

// ✍️ typing
document.getElementById("msg").addEventListener("input",()=>{
  socket.emit("typing");
});

socket.on("typing",(name)=>{
  document.getElementById("status").innerText=name+" typing...";
  setTimeout(()=>{
    document.getElementById("status").innerText="online";
  },2000);
});

// 📎 IMAGE SEND
const imgInput=document.getElementById("imgInput");

imgInput.onchange=()=>{
  const file=imgInput.files[0];
  const reader=new FileReader();

  reader.onload=()=>{
    socket.emit("sendImage",reader.result);

    document.getElementById("chat").innerHTML+=
      `<img src="${reader.result}" width="120">`;
  };

  reader.readAsDataURL(file);
};

// 🎤 VOICE
let recorder, audioData=[];

async function startRec(){
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});

  recorder=new MediaRecorder(stream);

  recorder.ondataavailable=e=>audioData.push(e.data);

  recorder.onstop=()=>{
    const blob=new Blob(audioData);
    const reader=new FileReader();

    reader.onload=()=>{
      socket.emit("sendVoice",reader.result);

      document.getElementById("chat").innerHTML+=
        `<audio controls src="${reader.result}"></audio>`;
    };

    reader.readAsDataURL(blob);
    audioData=[];
  };

  recorder.start();

  setTimeout(()=>recorder.stop(),3000);
}
</script>

</body>
</html>
