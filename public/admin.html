<!DOCTYPE html>
<html>
<head>
  <title>Admin 💙</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: 'Segoe UI';
    }

    #users {
      width: 30%;
      background: #1e293b;
      color: white;
      padding: 10px;
    }

    .user {
      padding: 10px;
      margin: 5px;
      background: #334155;
      border-radius: 8px;
      cursor: pointer;
    }

    #chatArea {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .me {
      background: #4a6cf7;
      color: white;
      margin-left: auto;
    }

    .other {
      background: #ddd;
    }
  </style>
</head>

<body>

<div id="users"></div>

<div id="chatArea">
  <div id="chatBox"></div>

  <div>
    <input id="input">
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
  var socket = io();
  var adminId = "admin123";

  let chats = {};
  let currentUser = "";

  socket.emit("join", adminId);

  socket.on("user list", function(list){
    let userList = document.getElementById("users");
    userList.innerHTML = "";

    list.forEach(id => {
      if(id === adminId) return;

      let div = document.createElement("div");
      div.classList.add("user");
      div.innerText = id;

      div.onclick = function(){
        currentUser = id;
        document.getElementById("chatBox").innerHTML = "";

        if(chats[id]){
          chats[id].forEach(msg => {
            let d = document.createElement("div");
            d.classList.add("msg", msg.type);
            d.innerText = msg.text;
            document.getElementById("chatBox").appendChild(d);
          });
        }
      };

      userList.appendChild(div);
    });
  });

  socket.on("private message", function(data){

    let user = (data.from === adminId) ? data.to : data.from;

    if(!chats[user]) chats[user] = [];

    let type = (data.from === adminId) ? "me" : "other";

    chats[user].push({
      text: data.msg,
      type: type
    });

    if(user === currentUser){
      let div = document.createElement("div");
      div.classList.add("msg", type);
      div.innerText = data.msg;
      document.getElementById("chatBox").appendChild(div);
    }
  });

  function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();

    if(text === "" || !currentUser){
      alert("User select karo");
      return;
    }

    socket.emit("private message", {
      from: adminId,
      to: currentUser,
      msg: text
    });

    input.value = "";
  }
</script>

</body>
</html>
