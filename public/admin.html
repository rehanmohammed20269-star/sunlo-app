<!DOCTYPE html>
<html>
<head>
  <title>SunLo Admin 💙</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      display: flex;
      height: 100vh;
      background: linear-gradient(135deg,#eef2ff,#c7d2fe);
    }

    #users {
      width: 25%;
      background: #1e293b;
      color: white;
      padding: 10px;
      overflow-y: auto;
    }

    .user {
      padding: 10px;
      margin: 5px 0;
      background: #334155;
      border-radius: 10px;
      cursor: pointer;
    }

    .user:hover {
      background: #4a6cf7;
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chatHeader {
      background: #4a6cf7;
      color: white;
      padding: 15px;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #4a6cf7;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: white;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      gap: 5px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #4a6cf7;
      color: white;
    }

    img {
      max-width: 150px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<audio id="notifySound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<div id="users">
  <h3>Users</h3>
  <div id="userList"></div>
</div>

<div id="chat">

  <div id="chatHeader">Select user</div>

  <div id="chatBox"></div>

  <div id="inputArea">
    <input id="input" placeholder="Reply..." oninput="typing()">
    <input type="file" id="img">
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let socket = io();
let adminId = "admin123";
let currentUser = "";
let users = {};
let chats = {};
let unread = {}; // 🔴 unread

socket.emit("join", {id: adminId, name:"Admin"});


// 👥 USER LIST
socket.on("user list",(list)=>{
  users = list;

  let userList = document.getElementById("userList");
  userList.innerHTML = "";

  for(let id in users){
    if(id === adminId) continue;

    let count = unread[id] ? " ("+unread[id]+")" : "";

    let div = document.createElement("div");
    div.className = "user";
    div.innerText = "🟢 " + users[id].name + count;

    div.onclick = ()=>{
      currentUser = id;
      unread[id] = 0;

      document.getElementById("chatHeader").innerText = users[id].name;

      let chatBox = document.getElementById("chatBox");
      chatBox.innerHTML = "";

      if(chats[id]){
        chats[id].forEach(msg=>{
          let d = document.createElement("div");
          d.className = "msg " + msg.type;
          d.innerHTML = msg.content;
          chatBox.appendChild(d);
        });
      }
    };

    userList.appendChild(div);
  }
});


// 💬 ADD MSG
function addMsg(content,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerHTML=content;
  document.getElementById("chatBox").appendChild(div);
}


// 📤 SEND
function send(){
  let text=document.getElementById("input").value;
  let file=document.getElementById("img").files[0];

  if(!currentUser) return alert("Select user");

  if(file){
    let reader=new FileReader();
    reader.onload=function(){
      socket.emit("private message",{
        from:adminId,
        to:currentUser,
        img:reader.result
      });

      storeMsg(currentUser,"me","<img src='"+reader.result+"'>");
    }
    reader.readAsDataURL(file);
  } else {
    socket.emit("private message",{
      from:adminId,
      to:currentUser,
      msg:text
    });

    storeMsg(currentUser,"me",text);
  }

  document.getElementById("input").value="";
}


// 📥 RECEIVE
socket.on("private message",(data)=>{

  let user = (data.from === adminId) ? data.to : data.from;

  let content = data.msg ? data.msg : "<img src='"+data.img+"'>";
  let type = (data.from === adminId) ? "me" : "other";

  storeMsg(user,type,content);

  if(user === currentUser){
    addMsg(content,type);
  }

  // 🔴 unread
  if(data.from !== adminId){
    if(!unread[user]) unread[user]=0;
    unread[user]++;
  }

  // 🔔 sound
  if(data.from !== adminId){
    document.getElementById("notifySound").play();
  }

});


// 🧠 STORE
function storeMsg(user,type,content){
  if(!chats[user]) chats[user]=[];

  chats[user].push({
    type:type,
    content:content
  });
}


// ⌨️ TYPING
function typing(){
  if(currentUser){
    socket.emit("typing",{to:currentUser});
  }
}


// ⌨️ RECEIVE TYPING
socket.on("typing",(data)=>{
  if(data.from === currentUser){
    document.getElementById("chatHeader").innerText =
      users[currentUser].name + " typing...";

    setTimeout(()=>{
      document.getElementById("chatHeader").innerText =
        users[currentUser].name;
    },1000);
  }
});
</script>

</body>
</html>
