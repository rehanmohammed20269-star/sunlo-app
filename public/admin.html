<!DOCTYPE html>
<html>
<head>
<title>SunLo Admin 💙</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* LAYOUT */
.container {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:30%;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:10px;
  overflow-y:auto;
}

.user {
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  background:#1e293b;
  cursor:pointer;
  transition:0.3s;
}

.user:hover {
  background:#4a6cf7;
}

/* CHAT AREA */
.chatArea {
  width:70%;
  display:flex;
  flex-direction:column;
}

.header {
  padding:15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* MSG */
.msg {
  padding:10px;
  margin:8px;
  border-radius:15px;
  max-width:70%;
  animation:fadeIn 0.3s ease;
}

.userMsg {
  background:#1e293b;
}

.adminMsg {
  background:#4a6cf7;
  margin-left:auto;
}

/* INPUT */
.inputBox {
  display:flex;
  padding:10px;
  gap:5px;
  background: rgba(255,255,255,0.05);
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

button {
  padding:10px;
  border:none;
  border-radius:50%;
  background:#4a6cf7;
  color:white;
}

/* animation */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">

  <!-- 👥 USERS -->
  <div class="sidebar">
    <h3>💙 Users</h3>
    <div id="users"></div>
  </div>

  <!-- 💬 CHAT -->
  <div class="chatArea">

    <div class="header">
      <b id="chatTitle">Select User</b>
    </div>

    <div id="chat"></div>

    <div class="inputBox">
      <input id="reply" placeholder="Type message..." />

      <input type="file" id="imgInput" hidden>
      <button onclick="imgInput.click()">📎</button>

      <button onclick="startRec()">🎤</button>

      <button onclick="sendReply()">➤</button>
    </div>

  </div>

</div>

<!-- 🔔 SOUND -->
<audio id="sound" src="/notification.mp3"></audio>

<script>
const socket = io();
let currentUser = null;

// 🔔 sound
function playSound(){
  let s=document.getElementById("sound");
  s.currentTime=0;
  s.play().catch(()=>{});
}
document.body.addEventListener("click",()=>playSound(),{once:true});

// 👥 user list
socket.on("userList",(users)=>{
  let html="";
  for(let id in users){
    html += `<div class="user" onclick="selectUser('${id}','${users[id]}')">
      ${users[id]}
    </div>`;
  }
  document.getElementById("users").innerHTML=html;
});

// select user
function selectUser(id,name){
  currentUser=id;
  document.getElementById("chat").innerHTML="";
  document.getElementById("chatTitle").innerText=name;
}

// 📩 receive text
socket.on("newMessage",(data)=>{
  if(data.id===currentUser){
    document.getElementById("chat").innerHTML+=
      `<div class="msg userMsg">${data.message}</div>`;
    playSound();
  }
});

// 📤 send text
function sendReply(){
  let msg=document.getElementById("reply").value;

  socket.emit("adminReply",{id:currentUser,message:msg});

  document.getElementById("chat").innerHTML+=
    `<div class="msg adminMsg">${msg}</div>`;

  document.getElementById("reply").value="";
}

// 📎 IMAGE SEND
const imgInput=document.getElementById("imgInput");

imgInput.onchange=()=>{
  const file=imgInput.files[0];
  const reader=new FileReader();

  reader.onload=()=>{
    socket.emit("sendImage",reader.result);

    document.getElementById("chat").innerHTML+=
      `<img src="${reader.result}" width="120">`;
  };

  reader.readAsDataURL(file);
};

// 📎 IMAGE RECEIVE
socket.on("receiveImage",(data)=>{
  if(data.id===currentUser){
    document.getElementById("chat").innerHTML+=
      `<img src="${data.img}" width="120">`;
    playSound();
  }
});

// 🎤 VOICE RECORD
let recorder, audioData=[];

async function startRec(){
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});

  recorder=new MediaRecorder(stream);

  recorder.ondataavailable=e=>audioData.push(e.data);

  recorder.onstop=()=>{
    const blob=new Blob(audioData);
    const reader=new FileReader();

    reader.onload=()=>{
      socket.emit("sendVoice",reader.result);

      document.getElementById("chat").innerHTML+=
        `<audio controls src="${reader.result}"></audio>`;
    };

    reader.readAsDataURL(blob);
    audioData=[];
  };

  recorder.start();
  setTimeout(()=>recorder.stop(),3000);
}

// 🎤 VOICE RECEIVE
socket.on("receiveVoice",(data)=>{
  if(data.id===currentUser){
    document.getElementById("chat").innerHTML+=
      `<audio controls src="${data.audio}"></audio>`;
    playSound();
  }
});
</script>

</body>
</html>
