<!DOCTYPE html>
<html>
<head>
  <title>SunLo Admin 💙</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      display: flex;
      height: 100vh;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    }

    /* Sidebar */
    #users {
      width: 25%;
      background: #1e293b;
      color: white;
      padding: 15px;
      overflow-y: auto;
    }

    #users h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .user {
      padding: 12px;
      margin: 6px 0;
      background: #334155;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .user:hover {
      background: #4a6cf7;
    }

    /* Chat Area */
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    #chatHeader {
      padding: 15px;
      background: #4a6cf7;
      color: white;
      font-weight: bold;
    }

    #chatBox {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 6px;
      padding: 10px;
      border-radius: 12px;
      max-width: 70%;
    }

    .me {
      background: #4a6cf7;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: white;
      align-self: flex-start;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: white;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #4a6cf7;
      color: white;
      cursor: pointer;
    }

    img {
      max-width: 150px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<audio id="notifySound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- USERS -->
<div id="users">
  <h2>👥 Users</h2>
  <div id="userList"></div>
</div>

<!-- CHAT -->
<div id="chat">

  <div id="chatHeader">Select a user</div>

  <div id="chatBox"></div>

  <div id="inputArea">
    <input id="input" placeholder="Type message...">
    <input type="file" id="img">
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let socket = io();
let adminId = "admin123";
let currentUser = "";
let users = {};

socket.emit("join", {id: adminId, name: "Admin"});

// 👥 USER LIST
socket.on("user list", (list)=>{
  users = list;

  let userList = document.getElementById("userList");
  userList.innerHTML = "";

  for(let id in users){
    if(id === adminId) continue;

    let div = document.createElement("div");
    div.className = "user";
    div.innerText = users[id].name;

    div.onclick = ()=>{
      currentUser = id;
      document.getElementById("chatHeader").innerText = users[id].name;
      document.getElementById("chatBox").innerHTML = "";
    };

    userList.appendChild(div);
  }
});

// 💬 ADD MESSAGE
function addMsg(content, type){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = content;
  document.getElementById("chatBox").appendChild(div);
}

// 📤 SEND
function send(){
  let text = document.getElementById("input").value;
  let file = document.getElementById("img").files[0];

  if(!currentUser) return alert("User select karo");

  if(file){
    let reader = new FileReader();
    reader.onload = function(){
      socket.emit("private message", {
        from: adminId,
        to: currentUser,
        img: reader.result
      });
      addMsg("<img src='"+reader.result+"'>","me");
    }
    reader.readAsDataURL(file);
  } else {
    socket.emit("private message", {
      from: adminId,
      to: currentUser,
      msg: text
    });
    addMsg(text,"me");
  }

  document.getElementById("input").value="";
}

// 📥 RECEIVE
socket.on("private message",(data)=>{

  let sound = document.getElementById("notifySound");

  if(data.from !== adminId){
    sound.play();
  }

  if(data.msg){
    addMsg(data.msg,"other");
  }

  if(data.img){
    addMsg("<img src='"+data.img+"'>","other");
  }

});
</script>

</body>
</html>
