<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel 💙</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      display: flex;
      height: 100vh;
      background: #f1f5f9;
    }

    /* Sidebar */
    #users {
      width: 30%;
      background: #1e293b;
      color: white;
      overflow-y: auto;
      padding: 10px;
    }

    #users h3 {
      text-align: center;
    }

    .user {
      padding: 10px;
      margin: 5px 0;
      background: #334155;
      border-radius: 8px;
      cursor: pointer;
    }

    .user:hover {
      background: #475569;
    }

    /* Chat Area */
    #chatArea {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #4a6cf7;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: #ddd;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #4a6cf7;
      color: white;
    }
  </style>
</head>

<body>

<!-- USERS -->
<div id="users">
  <h3>👥 Users</h3>
  <div id="userList"></div>
</div>

<!-- CHAT -->
<div id="chatArea">
  <div id="chatBox"></div>

  <div id="inputArea">
    <input id="input" placeholder="Reply karo...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
  var socket = io();
  var adminId = "admin123";

  let chats = {};
  let currentUser = "";

  socket.emit("join", adminId);

  // 🟢 USER LIST
  socket.on("user list", function(list){
    let userList = document.getElementById("userList");
    userList.innerHTML = "";

    list.forEach(id => {
      if(id === adminId) return;

      let div = document.createElement("div");
      div.classList.add("user");
      div.innerText = "User: " + id;

      div.onclick = function(){
        currentUser = id;
        document.getElementById("chatBox").innerHTML = "";

        if(chats[id]){
          chats[id].forEach(msg => {
            let d = document.createElement("div");
            d.classList.add("msg", msg.type);
            d.innerText = msg.text;
            document.getElementById("chatBox").appendChild(d);
          });
        }
      };

      document.getElementById("userList").appendChild(div);
    });
  });

  // 🟢 RECEIVE MESSAGE
  socket.on("private message", function(data){

    let user = (data.from === adminId) ? data.to : data.from;

    if(!chats[user]) chats[user] = [];

    let type = (data.from === adminId) ? "me" : "other";

    chats[user].push({
      text: data.msg,
      type: type
    });

    if(user === currentUser){
      let div = document.createElement("div");
      div.classList.add("msg", type);
      div.innerText = data.msg;
      document.getElementById("chatBox").appendChild(div);
    }
  });

  // 🟢 SEND MESSAGE
  function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();

    if(text === "" || !currentUser){
      alert("User select karo");
      return;
    }

    socket.emit("private message", {
      from: adminId,
      to: currentUser,
      msg: text
    });

    input.value = "";
  }
</script>

</body>
</html>
