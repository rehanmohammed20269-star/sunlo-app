<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<h2>Admin Panel 💙</h2>

<div id="chat"></div>

<input id="reply" placeholder="Reply..." />
<button onclick="sendReply()">Send</button>

<!-- 🔔 SOUND -->
<audio id="notifSound" src="notification.mp3" preload="auto"></audio>

<script>
const socket = io();

// 🔔 sound function
function playSound(){
  const sound = document.getElementById("notifSound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

// 🔓 enable sound
document.body.addEventListener("click", ()=>{
  playSound();
},{ once:true });

// 📥 user message receive
socket.on("userMessage", (msg)=>{
  document.getElementById("chat").innerHTML += "<p><b>User:</b> "+msg+"</p>";

  playSound(); // 🔔 SOUND TRIGGER
});

// 📤 send reply
function sendReply(){
  let msg = document.getElementById("reply").value;
  socket.emit("adminReply", msg);

  document.getElementById("chat").innerHTML += "<p><b>You:</b> "+msg+"</p>";
  document.getElementById("reply").value="";
}
</script>

</body>
</html>
