<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel 💙</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #eef2ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #4a6cf7;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .user {
      text-align: left;
      margin: 5px 0;
      color: #333;
    }

    .admin {
      text-align: right;
      margin: 5px 0;
      color: #4a6cf7;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💙 Admin Panel</h2>

  <div id="chat"></div>

  <input id="reply" placeholder="Type reply..." />
  <button onclick="sendReply()">Send</button>
</div>

<!-- 🔔 SOUND -->
<audio id="sound" src="notification.mp3"></audio>

<script>
const socket = io();

// 🔔 sound fix
function playSound(){
  let s = document.getElementById("sound");
  s.currentTime = 0;
  s.play().catch(()=>{});
}

// 🔓 enable sound
document.body.addEventListener("click", ()=>{
  playSound();
},{ once:true });

// 📥 USER MESSAGE RECEIVE (FIXED)
socket.on("userMessage", (msg)=>{
  console.log("User msg:", msg); // debug

  document.getElementById("chat").innerHTML += 
    "<div class='user'><b>User:</b> "+msg+"</div>";

  playSound(); // 🔔 SOUND
});

// 📤 SEND REPLY
function sendReply(){
  let msg = document.getElementById("reply").value;

  if(!msg) return;

  socket.emit("adminReply", msg);

  document.getElementById("chat").innerHTML += 
    "<div class='admin'><b>You:</b> "+msg+"</div>";

  document.getElementById("reply").value="";
}
</script>

</body>
</html>
